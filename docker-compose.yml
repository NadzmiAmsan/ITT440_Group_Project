version: '3.8'

networks:
  itt440_network:
    driver: bridge

services:
  # ─────────────────────────────────────────
  # TYPE 1 — DATABASE CONTAINER (Your task)
  # ─────────────────────────────────────────
  database:
    build: .                        # uses the Dockerfile in this folder
    container_name: itt440_database
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: itt440_db
      MYSQL_USER: itt440_user
      MYSQL_PASSWORD: itt440_pass
    ports:
      - "3307:3306"                 # host:container
    networks:
      - itt440_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

